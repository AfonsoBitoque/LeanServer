name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libssl-dev

      - uses: leanprover/lean-action@v1

      - name: Compile C FFI objects
        run: make

      - name: Run tests
        run: lake env lean tests/Test.lean
