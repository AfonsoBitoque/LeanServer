name = "LeanServer"
version = "0.1.0"
defaultTargets = ["LeanServer"]

# ── Pure Library (zero C dependencies) ───────────────────
# Import as `import LeanServerPure` for the full pure subset,
# or import individual modules like `import LeanServer.Crypto.AES`.
# Suitable for: Lake dependencies, WASM compilation, pure verification.

[[lean_lib]]
name = "LeanServerPure"
precompileModules = true

# ── Full Library (includes C FFI for networking, DB, OpenSSL) ─

[[lean_lib]]
name = "LeanServer"
cIncludeDirs = ["src"]
cSources = ["src/Network.c"]
moreLinkArgs = ["-lgmp"]
precompileModules = true

# ── Main Server ──────────────────────────────────────────

[[lean_exe]]
name = "leanserver"
root = "Main"
moreLinkArgs = ["-lgmp", "Network.o", "db_stubs.o", "crypto_ffi.o", "sqlite_ffi.o"]
supportInterpreter = true

# ── Application Entry Points ────────────────────────────

[[lean_exe]]
name = "webserver"
root = "app.WebServerMainSimple"
moreLinkArgs = ["-lgmp", "Network.o"]

[[lean_exe]]
name = "realhttps"
root = "app.RealHTTPServer"
moreLinkArgs = ["-lgmp", "Network.o"]

